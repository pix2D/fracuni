services:
  app:
    build: .
    user: "${FIRERACUNI_UID:-1000}:${FIRERACUNI_GID:-1000}"
    ports:
      - "127.0.0.1:4321:4321"
    environment:
      ASTRO_TELEMETRY_DISABLED: 1
      HOST: 0.0.0.0
      PORT: 4321
      FIRERACUNI_DATA_DIR: /data
    volumes:
      - ../fracuni-data-production:/data
    restart: unless-stopped
